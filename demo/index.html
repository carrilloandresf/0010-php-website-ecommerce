  <script>
// Config
const defaultConfig = {
  store_name: 'USA IMPORTS',
  whatsapp_number: '+573001234567',
  hero_title: 'DIRECTO DESDE USA 🇺🇸',
  background_color: '#FFFFFF',
  surface_color: '#0A1628',
  text_color: '#0A1628',
  primary_action_color: '#B22234',
  secondary_action_color: '#3C3B6E',
  font_family: 'DM Sans',
  font_size: 16
};

// Products Data
const categories = [
  { id: 'all', name: 'Todo', emoji: '🔥' },
  { id: 'celulares', name: 'Celulares', emoji: '📱' },
  { id: 'audifonos', name: 'Audífonos', emoji: '🎧' },
  { id: 'tablets', name: 'Tablets', emoji: '📲' },
  { id: 'consolas', name: 'Consolas', emoji: '🎮' },
  { id: 'parlantes', name: 'Parlantes', emoji: '🔊' },
  { id: 'cargadores', name: 'Cargadores', emoji: '🔋' },
  { id: 'camaras', name: 'Cámaras', emoji: '📷' },
  { id: 'iluminacion', name: 'Iluminación', emoji: '💡' },
  { id: 'gafas', name: 'Gafas', emoji: '🕶️' },
  { id: 'apple', name: 'Apple', emoji: '🍎' },
  { id: 'maletas', name: 'Maletas', emoji: '🧳' }
];

const products = [
  { id: 1, name: 'iPhone 15 Pro Max', price: 4200000, category: 'celulares', emoji: '📱', badge: '🔥 Hot', featured: true },
  { id: 2, name: 'Samsung Galaxy S24 Ultra', price: 3800000, category: 'celulares', emoji: '📱', badge: 'Nuevo', featured: true },
  { id: 3, name: 'AirPods Pro 2', price: 850000, category: 'audifonos', emoji: '🎧', badge: '⭐ Top', featured: true },
  { id: 4, name: 'JBL Flip 5', price: 420000, category: 'parlantes', emoji: '🔊', badge: 'Popular', featured: true },
  { id: 5, name: 'Nintendo Switch OLED', price: 1600000, category: 'consolas', emoji: '🎮', badge: '🎯 Oferta', featured: true },
  { id: 6, name: 'iPad Air M2', price: 2900000, category: 'tablets', emoji: '📲', featured: false },
  { id: 7, name: 'Galaxy Buds FE', price: 350000, category: 'audifonos', emoji: '🎧', featured: false },
  { id: 8, name: 'Motorola Razr', price: 2200000, category: 'celulares', emoji: '📱', featured: false },
  { id: 9, name: 'Ring Video Doorbell', price: 580000, category: 'camaras', emoji: '📷', badge: 'Seguridad', featured: true },
  { id: 10, name: 'Ray-Ban Wayfarer', price: 650000, category: 'gafas', emoji: '🕶️', featured: false },
  { id: 11, name: 'Oakley Holbrook', price: 720000, category: 'gafas', emoji: '🕶️', featured: false },
  { id: 12, name: 'AirTag 4-Pack', price: 450000, category: 'apple', emoji: '🍎', badge: 'Apple', featured: true },
  { id: 13, name: 'Power Bank 20000mAh', price: 180000, category: 'cargadores', emoji: '🔋', featured: false },
  { id: 14, name: 'Lámpara Solar LED', price: 120000, category: 'iluminacion', emoji: '💡', featured: false },
  { id: 15, name: 'Samsung Galaxy Tab S9', price: 1900000, category: 'tablets', emoji: '📲', featured: false },
  { id: 16, name: 'Contixo Kids Tablet', price: 350000, category: 'tablets', emoji: '📲', badge: 'Niños', featured: false },
  { id: 17, name: 'JBL Tune 520BT', price: 220000, category: 'audifonos', emoji: '🎧', featured: false },
  { id: 18, name: 'Skullcandy Dime', price: 150000, category: 'audifonos', emoji: '🎧', featured: false },
  { id: 19, name: 'Blink Mini Cámara', price: 280000, category: 'camaras', emoji: '📷', featured: false },
  { id: 20, name: 'Maleta Samsonite Carry-On', price: 680000, category: 'maletas', emoji: '🧳', badge: 'Nuevo', featured: true },
  { id: 21, name: 'Luces LED Sensor Movimiento', price: 95000, category: 'iluminacion', emoji: '💡', featured: false },
  { id: 22, name: 'Samsung Galaxy usado A54', price: 750000, category: 'celulares', emoji: '📱', badge: 'Usado', featured: false },
];

let cart = [];
let activeCategory = 'all';

// Format price
function formatPrice(n) {
  return '$' + n.toLocaleString('es-CO');
}

// Render categories
function renderCategories() {
  const bar = document.getElementById('categories-bar');
  bar.innerHTML = categories.map(c => `
    <button onclick="filterCategory('${c.id}')" class="category-pill flex-shrink-0 px-4 py-2 rounded-full text-sm font-semibold transition whitespace-nowrap ${activeCategory === c.id ? 'bg-usared text-white' : 'bg-gray-100 text-navy'}">${c.emoji} ${c.name}</button>
  `).join('');
}

// Render products
function renderProducts() {
  const grid = document.getElementById('products-grid');
  let filtered = activeCategory === 'all' ? products : products.filter(p => p.category === activeCategory);
  // Show featured first
  filtered.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));

  grid.innerHTML = `<div class="grid grid-cols-2 gap-3">${filtered.map(p => `
    <div class="product-card bg-white border border-gray-100 rounded-2xl p-3 shadow-sm relative fade-in">
      ${p.badge ? `<span class="absolute top-2 left-2 bg-usared text-white text-[10px] font-bold px-2 py-0.5 rounded-full">${p.badge}</span>` : ''}
      <div class="w-full aspect-square bg-gradient-to-br from-gray-50 to-gray-100 rounded-xl flex items-center justify-center text-4xl mb-2">${p.emoji}</div>
      <h4 class="font-semibold text-xs leading-tight mb-1 line-clamp-2">${p.name}</h4>
      <p class="text-usared font-bold text-sm mb-2">${formatPrice(p.price)}</p>
      <button onclick="addToCart(${p.id})" class="w-full bg-navy text-white text-xs font-semibold py-2 rounded-lg flex items-center justify-center gap-1 active:bg-usablue transition">
        <i data-lucide="plus" class="w-3 h-3"></i> Agregar
      </button>
    </div>
  `).join('')}</div>`;
  lucide.createIcons();
}

function filterCategory(id) {
  activeCategory = id;
  renderCategories();
  renderProducts();
}

// Cart
function addToCart(productId) {
  const p = products.find(x => x.id === productId);
  const existing = cart.find(x => x.id === productId);
  if (existing) existing.qty++;
  else cart.push({ ...p, qty: 1 });
  updateCartBadge();
  // Quick feedback
  const btn = event.target.closest('button');
  btn.textContent = '✓ Agregado';
  btn.classList.add('bg-green-600');
  setTimeout(() => { btn.innerHTML = '<i data-lucide="plus" class="w-3 h-3"></i> Agregar'; btn.classList.remove('bg-green-600'); lucide.createIcons(); }, 800);
}

function updateCartBadge() {
  const count = cart.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cart-count');
  if (count > 0) { badge.textContent = count; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

function toggleCart() {
  const overlay = document.getElementById('cart-overlay');
  overlay.classList.toggle('hidden');
  renderCart();
}

function renderCart() {
  const items = document.getElementById('cart-items');
  const footer = document.getElementById('cart-footer');
  const empty = document.getElementById('cart-empty');

  if (cart.length === 0) {
    empty.classList.remove('hidden');
    footer.classList.add('hidden');
    items.innerHTML = '<p id="cart-empty" class="text-center text-gray-400 py-8">Tu carrito está vacío</p>';
    return;
  }

  footer.classList.remove('hidden');
  items.innerHTML = cart.map(item => `
    <div class="flex items-center gap-3 py-3 border-b">
      <div class="w-12 h-12 bg-gray-100 rounded-xl flex items-center justify-center text-xl">${item.emoji}</div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold truncate">${item.name}</p>
        <p class="text-xs text-usared font-bold">${formatPrice(item.price)}</p>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="changeQty(${item.id}, -1)" class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-sm font-bold">−</button>
        <span class="text-sm font-semibold w-4 text-center">${item.qty}</span>
        <button onclick="changeQty(${item.id}, 1)" class="w-7 h-7 bg-gray-100 rounded-full flex items-center justify-center text-sm font-bold">+</button>
      </div>
    </div>
  `).join('');

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  document.getElementById('cart-total').textContent = formatPrice(total);
}

function changeQty(id, delta) {
  const item = cart.find(x => x.id === id);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) cart = cart.filter(x => x.id !== id);
  updateCartBadge();
  renderCart();
}

function sendWhatsApp() {
  const config = window.elementSdk ? window.elementSdk.config : defaultConfig;
  const phone = (config.whatsapp_number || defaultConfig.whatsapp_number).replace(/[^0-9+]/g, '');
  let msg = '¡Hola! 👋 Me interesan estos productos:\n\n';
  cart.forEach(item => {
    msg += `• ${item.name} x${item.qty} - ${formatPrice(item.price * item.qty)}\n`;
  });
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  msg += `\n💰 Total: ${formatPrice(total)}\n\n¿Están disponibles?`;
  const url = `https://wa.me/${phone.replace('+', '')}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

// Init
renderCategories();
renderProducts();

// Update WA float link
function updateWaFloat() {
  const config = window.elementSdk ? window.elementSdk.config : defaultConfig;
  const phone = (config.whatsapp_number || defaultConfig.whatsapp_number).replace(/[^0-9+]/g, '').replace('+', '');
  document.getElementById('wa-float').href = `https://wa.me/${phone}?text=${encodeURIComponent('¡Hola! Vi sus productos importados de USA y me gustaría saber más 🇺🇸')}`;
}
updateWaFloat();

// Element SDK
window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    document.getElementById('store-title').textContent = (config.store_name || defaultConfig.store_name).toUpperCase();
    document.getElementById('hero-heading').textContent = config.hero_title || defaultConfig.hero_title;
    updateWaFloat();
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
